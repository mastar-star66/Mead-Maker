<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A1A0A"/>
      <stop offset="100%" stop-color="#0D0A06"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="honey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E8A020"/>
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#5C3A1E"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="250" fill="none" stroke="#F5C842" stroke-width="6" stroke-dasharray="20 8"/>

  <!-- Viking ship hull -->
  <path d="M80 310 Q140 360 256 365 Q372 360 432 310 L420 295 Q370 340 256 345 Q142 340 92 295 Z" fill="url(#wood)"/>
  <path d="M92 295 Q142 340 256 345 Q370 340 420 295" fill="none" stroke="#F5C842" stroke-width="2.5"/>

  <!-- Hull planks -->
  <path d="M110 315 Q200 350 256 352 Q312 350 402 315" fill="none" stroke="#4A2E10" stroke-width="1.5" opacity="0.6"/>
  <path d="M130 330 Q210 360 256 362 Q302 360 382 330" fill="none" stroke="#4A2E10" stroke-width="1.5" opacity="0.6"/>

  <!-- Shields on side -->
  <circle cx="150" cy="305" r="18" fill="#8B1A1A" stroke="#F5C842" stroke-width="2.5"/>
  <circle cx="150" cy="305" r="8" fill="#F5C842"/>
  <circle cx="200" cy="318" r="18" fill="#1A3A8B" stroke="#F5C842" stroke-width="2.5"/>
  <circle cx="200" cy="318" r="8" fill="#F5C842"/>
  <circle cx="312" cy="318" r="18" fill="#1A3A8B" stroke="#F5C842" stroke-width="2.5"/>
  <circle cx="312" cy="318" r="8" fill="#F5C842"/>
  <circle cx="362" cy="305" r="18" fill="#8B1A1A" stroke="#F5C842" stroke-width="2.5"/>
  <circle cx="362" cy="305" r="8" fill="#F5C842"/>

  <!-- Mast -->
  <rect x="248" y="140" width="16" height="170" fill="url(#wood)" rx="3"/>
  <rect x="244" y="295" width="24" height="8" fill="#F5C842" rx="2"/>

  <!-- Sail -->
  <path d="M264 148 L380 200 L380 270 L264 285 Z" fill="#C8A870" opacity="0.95"/>
  <path d="M264 148 L380 200 L380 270 L264 285 Z" fill="none" stroke="#8B6A30" stroke-width="2"/>
  <!-- Sail rune/cross pattern -->
  <line x1="264" y1="215" x2="380" y2="232" stroke="#8B6A30" stroke-width="2.5"/>
  <line x1="322" y1="150" x2="322" y2="284" stroke="#8B6A30" stroke-width="2.5"/>
  <!-- Rune symbol on sail -->
  <text x="336" y="205" font-family="serif" font-size="28" fill="#5C3A1E" opacity="0.7" font-weight="bold">ᚹ</text>

  <!-- Dragon head prow -->
  <path d="M80 310 Q55 290 42 270 Q35 255 45 245 Q55 235 68 248 Q60 260 72 272 Q85 280 92 295 Z" fill="url(#wood)"/>
  <circle cx="52" cy="248" r="6" fill="#F5C842"/>
  <!-- Dragon mouth/tongue -->
  <path d="M42 270 Q35 265 30 258 Q38 252 45 245" fill="none" stroke="#8B1A1A" stroke-width="2"/>
  <!-- Horns -->
  <path d="M50 240 Q44 220 38 208 Q48 215 55 230" fill="#C8A870" stroke="#8B6A30" stroke-width="1.5"/>
  <path d="M65 242 Q68 220 72 208 Q75 218 72 235" fill="#C8A870" stroke="#8B6A30" stroke-width="1.5"/>

  <!-- Stern dragon tail -->
  <path d="M432 310 Q455 290 468 265 Q478 248 465 240 Q455 235 445 250 Q458 262 448 276 Q440 290 420 295 Z" fill="url(#wood)"/>

  <!-- Mead horn - large, central, glowing -->
  <g transform="translate(140,145) rotate(-20)">
    <path d="M0 0 Q10 5 45 15 Q65 22 70 50 Q72 75 50 85 Q30 90 10 70 Q-5 55 0 0 Z" fill="url(#honey)" stroke="#B8860B" stroke-width="2.5"/>
    <path d="M45 15 Q65 22 70 50 Q72 75 50 85" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
    <!-- Honey drip -->
    <path d="M50 85 Q48 95 50 110 Q52 120 48 130" fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <ellipse cx="48" cy="133" rx="5" ry="7" fill="#FFD700" opacity="0.7"/>
    <!-- Horn tip -->
    <path d="M0 0 Q-8 -5 -18 -2 Q-12 8 0 0" fill="#C8A870"/>
    <!-- Decorative band -->
    <path d="M18 5 Q28 10 35 12" fill="none" stroke="#F5C842" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Stars / sparkles -->
  <text x="380" y="155" font-size="22" fill="#F5C842" opacity="0.9">✦</text>
  <text x="110" y="185" font-size="16" fill="#F5C842" opacity="0.7">✦</text>
  <text x="400" y="260" font-size="12" fill="#FFD700" opacity="0.6">✦</text>
  <text x="88" y="255" font-size="14" fill="#FFD700" opacity="0.5">✦</text>

  <!-- Waves below ship -->
  <path d="M60 360 Q100 345 140 360 Q180 375 220 360 Q260 345 300 360 Q340 375 380 360 Q415 347 452 360" fill="none" stroke="#4A7FA5" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M75 378 Q115 363 155 378 Q195 393 235 378 Q275 363 315 378 Q355 393 395 378 Q428 366 452 374" fill="none" stroke="#4A7FA5" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

  <!-- App name -->
  <text x="256" y="434" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="url(#gold)" letter-spacing="4">MEADCRAFT</text>
  <text x="256" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#C8A870" letter-spacing="8">⚓ BREW MASTER ⚓</text>
</svg>
