<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MeadCraft — Viking Brew Master</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#F5C842" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MeadCraft" />
  <meta name="application-name" content="MeadCraft" />
  <meta name="description" content="Scientifically-accurate Viking mead tracking & recipe design with an AI brewing companion." />

  <!-- Open Graph -->
  <meta property="og:title" content="MeadCraft — Viking Brew Master" />
  <meta property="og:description" content="Track your mead batches, design recipes with science, and consult Skáld — your AI brewing companion." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="./icon.svg" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="./icon.svg" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />

  <!-- Manifest -->
  <link rel="manifest" href="./manifest.json" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- ── Install Banner ─────────────────────────────────────────────── -->
  <div id="install-banner">
    <div class="banner-inner">
      <div class="banner-icon">🍯</div>
      <div class="banner-text">
        <strong>Install MeadCraft</strong>
        <span>Add to your home screen for offline access — brew anywhere, even in a longhouse.</span>
      </div>
      <button class="banner-btn" id="install-btn">⚓ Install App</button>
      <button class="banner-dismiss" id="banner-dismiss" title="Dismiss">✕</button>
    </div>
  </div>

  <!-- ── App Header ─────────────────────────────────────────────────── -->
  <header id="app-header">
    <div class="header-inner">
      <div class="header-logo">
        <img src="./icon.svg" alt="MeadCraft icon" />
        <div class="header-titles">
          <h1>MeadCraft</h1>
          <p>Viking Brew Master &amp; AI Companion</p>
        </div>
      </div>
      <div class="header-runes">ᚱᚢᚾᛖ ᛗᛖᚨᛞ</div>
    </div>
  </header>

  <!-- ── Navigation Tabs ────────────────────────────────────────────── -->
  <nav id="main-nav">
    <div class="nav-inner">
      <!-- Tabs injected by app.js -->
    </div>
  </nav>

  <!-- ── Main Content ───────────────────────────────────────────────── -->
  <main id="app-content">
    <!-- Rendered by app.js -->
    <div class="empty-state">
      <div class="empty-icon">🍯</div>
      <p>Loading your mead hall...</p>
    </div>
  </main>

  <!-- ── App Script ─────────────────────────────────────────────────── -->
  <script src="./app.js"></script>
</body>
</html>
